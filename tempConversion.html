<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TP4 - JavaScript</title>
</head>
<body>
    <script>
        function degreC(tempF) {
                let tempC = (5 / 9) * (parseFloat(tempF) - 32)
                console.log(`Cette température équivaut a ${tempC.toFixed(2)} degrés Celsius`);
            }

            let tempF = prompt("Une température en Fahrenheit : ");
            degreC(tempF)
    </script>
</body>
</html>
